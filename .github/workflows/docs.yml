# Build MkDocs and deploy to GitHub Pages.
name: Deploy documentation

on:
  push:
    branches: main
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - ".github/workflows/**"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install MkDocs
        run: pip install mkdocs-material 

      - name: Set site and repo URLs
        run: |
          python3 << 'PY'
          import pathlib
          import re

          path = pathlib.Path("mkdocs.yml")
          text = path.read_text()
          owner, repo = "${{ github.repository }}".split("/")
          site_url = f"https://{owner}.github.io/{repo}/"
          repo_url = f"https://github.com/{owner}/{repo}"
          text = re.sub(r"^site_url:.*$", f"site_url: {site_url}", text, flags=re.M)
          text = re.sub(r"^repo_url:.*$", f"repo_url: {repo_url}", text, flags=re.M)
          path.write_text(text)
          print("Auto-configured site_url:", site_url)
          PY

      - name: Build site
        run: mkdocs build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
