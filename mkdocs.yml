site_name: GVVM Documentation
site_description: GPU-accelerated Vector Vorticity Model
site_author: GVVM Development Team
# Local dev: serve at http://127.0.0.1:8000/ (no /VVM_GPU_CPP/ prefix). GitHub Actions replaces this with the real Pages URL before deploy.
site_url: http://127.0.0.1:8000/
repo_url: https://github.com/Aaron-Hsieh-0129/VVM_GPU_CPP
repo_name: VVM_GPU_CPP
edit_uri: edit/main/docs/

# Match local `mkdocs serve` and GitHub Pages: default scheme follows the browser/OS
# (otherwise the first palette entry is always the initial paint — often confused with "wrong theme").
plugins:
  - search

theme:
  name: material
  language: en
  features:
    - toc.integrate        
    - navigation.indexes   
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
  palette:
    # Default follows prefers-color-scheme; toggle still switches schemes (persists in localStorage)
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      accent: deep purple
      toggle:
        icon: material/brightness-7
        name: Switch to light mode
  # Avoid Google Fonts (blocked in some networks); same typography locally and on GitHub Pages
  font: false

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - tables


nav:
  - Home: index.md
  - Quick Start: quick-start.md
  - User Guides:
      - Overview: user-guides/index.md
      - Model Configuration: user-guides/configuration.md
      - I/O Management: user-guides/io-management.md
  - Developer Guides:
      - Overview: developer-guides/index.md
      - System Architecture: developer-guides/architecture.md
      - Physics Implementation: developer-guides/physics.md
  - Examples:
      - Gallery Overview: examples/index.md
      - Idealized Simulations: examples/idealized.md
      - TaiwanVVM: examples/taiwan-vvm.md

